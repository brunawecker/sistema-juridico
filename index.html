<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Jurídico Operacional</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#447F98;--navy-lt:#629BB5;--ice:#D6E8F3;--glacier:#B9D8E1;
  --dani:#2C6E8A;--dani-lt:#E0F2F7;--red:#C0392B;--red-lt:#FDEDEC;
  --amber:#D68910;--amber-lt:#FEF9E7;--green:#1E8449;--green-lt:#E9F7EF;
  --roxo:#7B2D8B;--gray:#607D8B;--gray-lt:#F0F5F8;--border:#CBE0EA;--text:#1A2E38;
  --bg:#EEF6FA;--sw:230px;--r:14px;
  --sh:0 2px 8px rgba(68,127,152,.1),0 8px 24px rgba(68,127,152,.06);
  --sh2:0 4px 16px rgba(68,127,152,.15),0 12px 40px rgba(68,127,152,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* LOGIN */
#tela-login{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#2C6E8A 0%,#447F98 40%,#629BB5 70%,#B9D8E1 100%)}
.lc{background:rgba(255,255,255,.97);border-radius:22px;padding:44px 38px;width:370px;
  box-shadow:0 24px 80px rgba(44,110,138,.3)}
.ll{font-size:10px;font-weight:700;color:var(--navy);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px}
.lt{font-size:25px;font-weight:700;color:var(--navy);margin-bottom:3px}
.ls2{font-size:13px;color:var(--gray);margin-bottom:24px}
.btn{padding:9px 15px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;
  font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btp{background:linear-gradient(135deg,var(--navy),var(--navy-lt));color:white;box-shadow:0 4px 15px rgba(68,127,152,.35)}
.btp:hover{filter:brightness(1.06)}
.bts{background:white;color:var(--navy);border:1px solid var(--border)}.bts:hover{background:var(--gray-lt)}
.btg{background:var(--green);color:white}.btr{background:var(--red);color:white}.btx{background:var(--roxo);color:white}
.btw{width:100%}.btsm{padding:6px 11px;font-size:12px}
.fi{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:9px;
  font-family:'DM Sans',sans-serif;font-size:14px;background:white;margin-bottom:9px}
.fi:focus,.fsel:focus,.fta:focus{outline:none;border-color:var(--navy)}
.aviso{font-size:12px;border-radius:9px;padding:9px 12px;margin-top:12px;line-height:1.5}
.aviso.erro{background:var(--red-lt);color:var(--red)}.aviso.info{background:var(--ice);color:var(--dani)}
.separa{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--gray);font-size:11px}
.separa::before,.separa::after{content:"";flex:1;height:1px;background:var(--border)}
/* SHELL com sidebar */
#app{display:none}
.sb{position:fixed;top:0;left:0;height:100vh;width:var(--sw);color:white;display:flex;flex-direction:column;
  z-index:100;background:linear-gradient(170deg,#2C6E8A 0%,#447F98 50%,#5A90A8 100%);transition:transform .25s}
.sbh{padding:15px 15px 12px;border-bottom:1px solid rgba(255,255,255,.12)}
.sbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.55}
.sbt{font-size:14px;font-weight:700}
.sbu{padding:11px 15px;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(255,255,255,.12)}
.sbav{width:31px;height:31px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;
  align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.sbnm{font-size:13px;font-weight:600;line-height:1.2}.sbrl{font-size:10px;opacity:.6}
.sbn{flex:1;padding:8px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:12.5px;
  font-weight:500;cursor:pointer;color:rgba(255,255,255,.72);border:none;background:none;
  width:100%;text-align:left;transition:all .12s}
.ni:hover{background:rgba(255,255,255,.1);color:white}
.ni.on{background:rgba(255,255,255,.18);color:white;font-weight:600}
.ni-i{width:17px;text-align:center;flex-shrink:0}
.sbf{padding:10px 15px;border-top:1px solid rgba(255,255,255,.12);font-size:10px;opacity:.4}
.mn{margin-left:var(--sw);min-height:100vh}
.tb{background:white;border-bottom:1px solid var(--border);padding:0 18px;height:52px;display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:8px}
.tbt{font-size:15px;font-weight:700;color:var(--navy)}
.ct{padding:16px 18px 60px;max-width:1080px}
.faixa{background:var(--roxo);color:white;border-radius:10px;padding:8px 14px;font-size:12.5px;
  font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.mbb{display:none;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:white;cursor:pointer;font-size:15px}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:90;display:none}.ovl.on{display:block}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:4px 0 16px}
.sc{background:linear-gradient(135deg,white,#F4FAFC);border-radius:var(--r);padding:12px 14px;
  border:1px solid var(--border);box-shadow:var(--sh)}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:4px}
.sv{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.sv.red{color:var(--red)}.sv.green{color:var(--green)}.sv.amber{color:var(--amber)}
.sv.pq{font-size:16px}
/* CARDS de tarefa */
.grupo-t{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.07em;
  margin:16px 0 8px;display:flex;justify-content:space-between}
.grupo-t .qt{color:var(--gray);font-weight:500;text-transform:none;letter-spacing:0}
.tc{background:linear-gradient(135deg,white 0%,#F7FBFD 100%);border-radius:var(--r);padding:11px 14px;
  border:1px solid var(--border);border-left:4px solid transparent;box-shadow:var(--sh);cursor:pointer;
  transition:all .15s;display:flex;gap:10px;align-items:flex-start;margin-bottom:6px}
.tc:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.tc.u1{border-left-color:var(--red)}.tc.u2{border-left-color:var(--amber)}
.tc.u3{border-left-color:#3B82F6}.tc.u4{border-left-color:#8B5CF6}.tc.u5{border-left-color:var(--glacier)}
.tcc{font-size:13px;font-weight:600;color:var(--navy)}
.tcm{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.tco{font-size:11px;color:var(--gray)}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase}
.ti{background:var(--red-lt);color:var(--red)}.td2{background:var(--amber-lt);color:var(--amber)}
.ts{background:#EDE9FE;color:#7C3AED}.tm{background:var(--gray-lt);color:var(--gray)}
.tek{background:var(--green-lt);color:var(--green)}
.tda{background:var(--dani-lt);color:var(--dani)}
.tdy{font-size:11px;font-family:'DM Mono',monospace;margin-left:auto;white-space:nowrap}
.tdy.ov{color:var(--red);font-weight:600}.tdy.ok{color:var(--green)}
.vazio{text-align:center;padding:38px 16px;color:var(--gray)}
.carregando{display:flex;justify-content:center;padding:40px}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:g .8s linear infinite}
@keyframes g{to{transform:rotate(360deg)}}
/* filtros / tabelas */
.flr{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.si{padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:13px;background:white;flex:1;min-width:150px}
.fsel{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:12px;background:white;cursor:pointer}
.painel{background:white;border-radius:var(--r);border:1px solid var(--border);padding:13px 15px;box-shadow:var(--sh);margin-bottom:14px}
.barra{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.barra .nm{font-size:12px;font-weight:600;width:88px;flex-shrink:0}
.barra .tk{flex:1;height:6px;background:var(--gray-lt);border-radius:3px;overflow:hidden}
.barra .fl{height:100%;border-radius:3px}
.barra .vl{font-size:12px;font-weight:700;width:34px;text-align:right}
.linha-item{display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-lt);font-size:12.5px}
.det{background:white;border:1px solid var(--border);border-radius:10px;margin-bottom:7px;overflow:hidden}
.det summary{cursor:pointer;list-style:none;padding:11px 14px;display:flex;align-items:center;gap:9px}
.det summary::-webkit-details-marker{display:none}
.cap{height:9px;background:var(--gray-lt);border-radius:5px;overflow:hidden;margin:5px 0}
.cap>div{height:100%;border-radius:5px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cald{min-height:78px;border:1px solid var(--border);border-radius:9px;padding:5px;background:white;font-size:9px;cursor:pointer}
.cald.hoje{border:2px solid var(--navy);background:var(--dani-lt)}
.cald.fora{background:#FAFBFC;opacity:.5}
.calpin{background:var(--ice);border-left:2px solid var(--navy);border-radius:3px;padding:1px 4px;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* MODAL */
.mfundo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:14px}
.mfundo.aberto{display:flex}
.mcaixa{background:white;border-radius:18px;width:100%;max-width:620px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(44,110,138,.3)}
.mtopo{padding:15px 17px 11px;border-bottom:1px solid var(--border);position:sticky;top:0;background:white;display:flex;justify-content:space-between;gap:10px;z-index:1}
.mtit{font-size:15px;font-weight:700;color:var(--navy)}.msub{font-size:11px;color:var(--gray);margin-top:2px}
.mfecha{width:28px;height:28px;border-radius:50%;border:none;background:var(--gray-lt);cursor:pointer;font-size:14px;flex-shrink:0}
.mcorpo{padding:14px 17px}
.bloco{margin-bottom:15px}
.bloco-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray);margin-bottom:7px}
.dados{background:var(--ice);border:1px solid var(--glacier);border-radius:10px;padding:10px 13px;display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:12px}
.dados b{color:var(--navy)}
.timerbox{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:9px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.timernum{font-family:'DM Mono',monospace;font-size:21px;font-weight:700;color:#15803D}
.fta{width:100%;min-height:60px;padding:9px 11px;border:1px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical}
.linha-acao{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;align-items:center}
.hentrada{display:flex;gap:9px;margin-bottom:9px}
.hbola{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;background:var(--green)}
.hbola.sup{background:var(--dani)}.hbola.enc{background:var(--roxo)}
.hmeta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:2px}
.hautor{font-size:11px;font-weight:700;color:var(--navy)}
.hdata{font-size:11px;color:var(--gray);font-family:'DM Mono',monospace}
.htipo{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:var(--gray-lt);color:var(--gray)}
.htexto{font-size:13px;line-height:1.5;white-space:pre-line}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);
  color:white;padding:10px 17px;border-radius:9px;font-size:13px;font-weight:500;z-index:9999;opacity:0;
  transition:all .25s;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.25)}
#toast.mostra{transform:translateX(-50%);opacity:1}
#toast.ok{background:var(--green)}#toast.erro{background:var(--red)}
@media(max-width:820px){:root{--sw:0px}.sb{transform:translateX(-240px);width:240px}.sb.on{transform:translateX(0)}.mbb{display:flex}}
</style>
</head>

    <div class="ll">Villela Advogados</div>
    <div class="lt">Sistema Jurídico</div>
    <div class="ls2">Operacional &amp; Gestão de Tarefas</div>

      <button class="btn btp btw" onclick="entrarGoogle()">Entrar com Google</button>

      <button class="btn bts btw" style="margin-top:7px" onclick="criarSenha()">Primeiro acesso — criar senha</button>
    </div>
    <div id="login-aviso"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

      <div><div class="sbnm" id="sb-nm">—</div><div class="sbrl" id="sb-rl">—</div></div></div>

      </div>

        <span id="area-vercomo"></span>
        <button class="btn bts btsm" onclick="recarregar()">&#8635;</button>
        <button class="btn bts btsm" onclick="sair()">Sair</button>
      </div>
    </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mfundo" id="modal"><div class="mcaixa">
  <div class="mtopo"><div><div class="mtit" id="m-titulo">—</div><div class="msub" id="m-sub">—</div></div>
    <button class="mfecha" onclick="fecharModal()">&#10005;</button></div>
  <div class="mcorpo" id="m-corpo"></div>
</div></div>

<!-- MODAL 2 (sobreposto: correção, encerrar, delegar...) -->
<div class="mfundo" id="modal2" style="z-index:300"><div class="mcaixa" style="max-width:520px">
  <div class="mtopo"><div><div class="mtit" id="m2-titulo">—</div><div class="msub" id="m2-sub">—</div></div>
    <button class="mfecha" onclick="fecharModal2()">&#10005;</button></div>
  <div class="mcorpo" id="m2-corpo"></div>
</div></div>

// ===== Robô de produtividade: tempos REAIS medidos por pessoa + tipo =====
// Soma as sessões da mesma tarefa no mesmo dia (1 execução) e tira a mediana.
async function carregarTemposReais(ops){
  if(E._tReal)return;
  let hist=[];try{hist=await DB.historicoTimers(120);}catch(e){hist=[];}
  const opDe={};(ops||[]).forEach(t=>{if(t.id_tarefa)opDe[t.id_tarefa]=t.operacao||"";});
  const exec={};
  (hist||[]).forEach(r=>{if(r.tipo!=="TIMER")return;
    const m=parseInt((String(r.texto||"").match(/(\d+)\s*min/)||[0,0])[1]);if(!m)return;
    const a=loginDe(r.autor),op=opDe[r.id_tarefa];if(!a||!op)return;
    const k=a+"|"+op+"|"+r.id_tarefa+"|"+String(r.data_dt||"").slice(0,10);
    exec[k]=(exec[k]||0)+m;});
  const porPar={},porOp={};
  Object.entries(exec).forEach(([k,min])=>{const p=k.split("|");
    (porPar[p[0]+"|"+p[1]]=porPar[p[0]+"|"+p[1]]||[]).push(min);
    (porOp[p[1]]=porOp[p[1]]||[]).push(min);});
  const med=v=>{v.sort((a,b)=>a-b);return v[Math.floor(v.length/2)];};
  E._tReal={};E._tRealN={};E._tRealOp={};E._tRealOpN={};
  Object.entries(porPar).forEach(([k,v])=>{E._tRealN[k]=v.length;if(v.length>=5)E._tReal[k]=med(v);});
  Object.entries(porOp).forEach(([k,v])=>{E._tRealOpN[k]=v.length;if(v.length>=5)E._tRealOp[k]=med(v);});
}
// tempo para PLANEJAR o dia: mediana real (pessoa → equipe), mas nunca menor
// que metade do padrão — o cronômetro só vê o trabalho dentro do site.
function tempoPlanoDe(assessor,op){
  const a=loginDe(assessor||"");
  const tr=(E._tReal||{})[a+"|"+op]||(E._tRealOp||{})[op];
  if(!tr)return tempoDe(op);
  return Math.max(Math.round(tempoDe(op)/2),Math.min(tr,tempoDe(op)*3));
}

function P(body){return{method:"POST",body:JSON.stringify(body)};}
function filtraLocalClientes(cs,q){if(!q)return cs;const t=q.toLowerCase(),dig=q.replace(/\D/g,"");
  return cs.filter(c=>String(c.nome||"").toLowerCase().includes(t)||String(c.id_cliente||"").toLowerCase().includes(t)
    ||(dig.length>=3&&String(c.cnpj_cpf||"").replace(/\D/g,"").includes(dig)));}
function brHoje(){const d=new Date();return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getFullYear()).slice(-2);}
function horaAgora(){const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}

// Traduz as mensagens técnicas do banco para algo que dá para entender.
// Mensagens já em português (das nossas funções/travas) passam intactas.
function traduzErro(m){const s=String(m||"");
  if(/jwt|token.*expired|invalid claim/i.test(s))return "Sua sessão expirou. Recarregue a página e entre de novo.";
  if(/failed to fetch|networkerror|load failed|network request/i.test(s))return "Sem conexão com o banco. Confira a internet e tente de novo.";
  if(/row-level security|violates row|permission denied/i.test(s))return "Você não tem permissão para essa ação.";
  if(/duplicate key/i.test(s))return "Já existe um registro com esse código.";
  if(/violates check constraint/i.test(s))return "Valor fora do padrão aceito — confira o preenchimento.";
  return s;}

    data:brHoje(),data_dt:hojeISO(),autor:E.perfil.nome_sistema,tipo:tipo,texto:texto,origem:"SITE"});
  if(error)throw new Error(traduzErro(error.message));return hid;}

  try{const cf=await DB.config();

    (cf.tmp||[]).forEach(r=>{TEMPOS_PADRAO[r.operacao==="_PADRAO"?"_default":r.operacao]=r.minutos;});

}

async function salvarConfigCap(){const cf=E._cfgAtual;let n=0;
  for(const nome of (E.equipe||[]).map(m=>m.nome_sistema)){
    const el=ge("cfg-cap-"+nome);if(!el||el.value==="")continue;
    const v=parseInt(el.value);
    if(!v||v<60||v>720){toast("Capacidade de "+nome+" precisa estar entre 60 e 720 minutos.","erro");return;}
    const atual=(cf.cap||[]).find(x=>x.nome===nome);
    if(atual&&atual.minutos===v)continue;
    try{await DB.configSet("config_capacidade","nome",nome,{minutos:v});n++;}
    catch(e){toast("Erro em "+nome+": "+e.message,"erro");return;}}
  await carregarConfig();toast(n?n+" capacidade(s) salva(s)!":"Nada mudou.","ok");telaConfig();}
async function salvarConfigPer(){const cf=E._cfgAtual;let n=0;
  for(const nome of (E.equipe||[]).map(m=>m.nome_sistema)){
    const c=ge("cfg-cor-"+nome),d=ge("cfg-del-"+nome);if(!c||!d)continue;
    const atual=(cf.per||[]).find(x=>x.nome===nome)||{pode_corrigir:false,pode_delegar:false};
    if(atual.pode_corrigir===c.checked&&atual.pode_delegar===d.checked)continue;
    try{await DB.configSet("config_permissoes","nome",nome,{pode_corrigir:c.checked,pode_delegar:d.checked});n++;}
    catch(e){toast("Erro em "+nome+": "+e.message,"erro");return;}}
  await carregarConfig();toast(n?n+" permissão(ões) salva(s)!":"Nada mudou.","ok");telaConfig();}
async function salvarConfigTmp(){const cf=E._cfgAtual;let n=0;
  for(const t of (cf.tmp||[])){
    const el=ge("cfg-tmp-"+t.operacao);if(!el)continue;
    const v=parseInt(el.value);
    if(!v||v<1||v>480){toast("Tempo de \""+t.operacao+"\" precisa estar entre 1 e 480 minutos.","erro");return;}
    if(v===t.minutos)continue;
    try{await DB.configSet("config_tempos","operacao",t.operacao,{minutos:v});n++;}
    catch(e){toast("Erro em \""+t.operacao+"\": "+e.message,"erro");return;}}
  await carregarConfig();toast(n?n+" tempo(s) salvo(s)!":"Nada mudou.","ok");telaConfig();}

// ============================================== classificação de tarefas
function classificar(t){
  const d=diasAte(t.data_revisao_dt), st=String(t.status_tarefa||"");
  t._dias=d; t._concluida=st.includes("EM DIA"); t._delegada=st.includes("DELEGADA");
  t._emCorrecao=!!String(t.correcao_head||"").trim();
  t._impulso=String(t.supervisao||"").includes("IMPULSO de");
  const pf=diasAte(t.prazo_fatal_dt); t._pfDias=pf; t._prazoAlerta=(pf!==null&&pf<=5);
  t._impedimento=/impedimento/i.test(String(t.operacao||""));
  t._quedaDias=t._impedimento?diasAte(t.queda_impedimento_dt):null;
  t._tempo=tempoDe(t.operacao);
  let chk=String(t.check_||"");
  // AGUARDANDO converte pela proximidade do prazo (regra do Code.gs)
  if(chk==="AGUARDANDO"){
    if(pf!==null&&pf<=5){chk="IMEDIATO";}
    else if(d!==null&&d<=0){chk="DIÁRIO";}
    else chk="AGUARDANDO_FUTURO";
  }
  t._chk=chk;
  t._atrasada=!t._concluida&&d!==null&&d<0;
  if(t._delegada)t._g=0;
  else if(chk==="IMEDIATO"&&!t._concluida)t._g=1;
  else if(t._atrasada&&chk!=="IMEDIATO")t._g=2;
  else if(!t._concluida&&(d===0||/DI[ÁA]RIO/.test(chk)))t._g=3;
  else t._g=4;
  return t;
}
function cardTarefa(t,mostrarAssessor,mostrarTempo){
  const ec={IMEDIATO:'<span class="tag ti">IMEDIATO</span>',"DIÁRIO":'<span class="tag td2">DIÁRIO</span>',
    DIARIO:'<span class="tag td2">DIÁRIO</span>',SEMANAL:'<span class="tag ts">SEMANAL</span>',
    MENSAL:'<span class="tag tm">MENSAL</span>',AGUARDANDO:'<span class="tag tm">AGUARDANDO</span>',
    AGUARDANDO_FUTURO:'<span class="tag tm">AGUARDANDO</span>'}[t._chk||t.check_]
    ||(t.check_?`<span class="tag tm">${esc(t.check_)}</span>`:"");
  const es=t._delegada?`<span class="tag" style="background:#1F4E79;color:white">${esc(t.status_tarefa)}</span>`
    :t._concluida?'<span class="tag tek">EM DIA</span>':(t._atrasada?'<span class="tag ti">ATRASADO</span>':"");
  const hd=t.advogada==="Danielly"?'<span class="tag tda">Danielly</span>'
    :t.advogada==="Eduarda"?'<span class="tag" style="background:#7B2D8B;color:white">Eduarda</span>'
    :t.advogada==="Bruna"?'<span class="tag" style="background:var(--green-lt);color:var(--green)">Bruna</span>':"";
  const fin=t._inad?'<span class="tag ti" title="Cobrança vencida">&#128184;</span>'
    :t._pago?'<span class="tag tek" title="Pagou este mês">&#10003;</span>'
    :t._prov?'<span class="tag" style="background:var(--ice);color:var(--dani)" title="Provisionado no mês">&#128176;</span>':"";
  const dt=t._dias===null?"":t._atrasada?`<span class="tdy ov">${Math.abs(t._dias)}d atraso</span>`:
    (t._dias===0&&!t._concluida?`<span class="tdy ov">vence hoje</span>`:`<span class="tdy ok">rev ${brData(t.data_revisao_dt)}</span>`);
  const pf=t._prazoAlerta?`<span class="tag ti">&#9888; ${brData(t.prazo_fatal_dt)}</span>`:"";
  const ass=mostrarAssessor&&t.assessor?`<span class="tco">&#128100; ${esc(t.assessor)}</span>`:"";
  const tmp=mostrarTempo?`<span class="tco" style="font-family:'DM Mono'">&#9201;${t._tempo}min</span>`:"";
  return `<div class="tc u${t._g||5}" onclick="abrirTarefa('${esc(t.id_tarefa)}')"><div style="flex:1;min-width:0">
    <div class="tcc">${esc(t.cliente)}${fin}</div>
    <div class="tcm"><span class="tco">${esc(t.operacao||"")}</span>${ec}${es}${hd}${pf}${ass}${tmp}</div></div>${dt}</div>`;
}
// Banner de prazos fatais desta semana (clicável)
function bannerPrazoFatal(ts){
  const crit=ts.filter(t=>t._pfDias!==null&&t._pfDias<=7&&!t._concluida).sort((a,b)=>a._pfDias-b._pfDias);
  if(!crit.length)return"";
  const itens=crit.slice(0,6).map(c=>{const cor=c._pfDias<0?"#7B0000":c._pfDias<=2?"var(--red)":"var(--amber)";
    const txt=c._pfDias<0?`venceu há ${Math.abs(c._pfDias)}d`:c._pfDias===0?"VENCE HOJE":c._pfDias===1?"vence amanhã":`em ${c._pfDias} dias`;
    return `<div class="linha-item" style="cursor:pointer" onclick="abrirTarefa('${esc(c.id_tarefa)}')">
      <span>${esc(c.cliente)} · ${esc(c.operacao||"")}${c.assessor?" · "+esc(c.assessor):""}</span>
      <b style="color:${cor};white-space:nowrap">&#9888; ${txt}</b></div>`;}).join("");
  return `<div class="painel" style="background:var(--red-lt);border-color:var(--red)">
    <div style="font-weight:700;color:var(--red);margin-bottom:6px">&#9888; ${crit.length} tarefa(s) com prazo fatal esta semana</div>${itens}</div>`;
}
// Enriquecimento financeiro (badges): provisionado / pago / inadimplente
function aplicarFinanceiro(ts){
  const m=E._bilMap; if(!m)return;
  ts.forEach(t=>{const c=String(t.cnpj_cpf||"").replace(/\D/g,"");const b=m[c];
    if(b){t._prov=true;t._pago=b.pago;t._inad=b.inad;}});
}
async function carregarFinanceiro(){
  if(E._bilMap)return;
  try{const rows=await DB.cobranca();const m={};
    rows.forEach(r=>{const c=String(r.cnpj_cpf||"").replace(/\D/g,"");if(!c)return;
      const o=m[c]=m[c]||{pago:false,inad:false};
      if(r.status_pgto==="PAGO")o.pago=true;if(r.status_pgto==="ATRASADO")o.inad=true;});
    E._bilMap=m;}catch(e){E._bilMap={};}
}

  mensal.sort((a,b)=>pesoF(a)-pesoF(b)||b._dias-a._dias);
  const plano=[],fila=[],jaAdd={};

  // IMEDIATO entra sempre; o resto só até a capacidade — excedente vai à fila

  for(const t of diar){if(jaAdd[t.id_tarefa])continue;
    if(rem-t._tempo<0){fila.push(t);continue;}if(push1(t,t._dias<0?2:3))rem-=t._tempo;}
  let nAtr=0;
  for(const t of atr){if(jaAdd[t.id_tarefa])continue;
    if(rem<=0&&nAtr>=3){fila.push(t);continue;}if(push1(t,2)){rem-=t._tempo;nAtr++;}}
  rem=Math.max(0,rem);
  for(const t of hoje0.concat(semanal).concat(mensal)){if(jaAdd[t.id_tarefa])continue;
    if(rem<=0){fila.push(t);continue;}if(push1(t,t._dias===0?3:4))rem-=t._tempo;}
  plano.sort((a,b)=>a._urg-b._urg||a._dias-b._dias);

      ${minReu?`· &#128197; ${fmtMin(minReu)} em reuniões`:""} · &#128203; ${ativas.length} no portfólio (mostrando ${plano.length})</div></div>`;

  if(emCorr.length)h+=`<div class="painel" style="background:#F5F2FC;border-color:#D9CEF0">

  if(fila.length)h+=`<div class="painel" style="background:var(--gray-lt)">

// ===== Vigia de inatividade (assessores): aviso após 30 min sem sessão =====
// Silêncio: fins de semana, fora de 9h–19h e almoço 12h–14h (descontado da conta).
function marcarAtividade(){E._ultAtiv=Date.now();
  const b=document.getElementById("aviso-inativo");if(b)b.remove();
  if(E._tituloInt){clearInterval(E._tituloInt);E._tituloInt=null;}
  if(E._tituloOrig)document.title=E._tituloOrig;}
function iniciarVigiaInatividade(){
  if(E._vigia)return;E._vigia=true;marcarAtividade();
  setInterval(checarInatividade,60000);}
function checarInatividade(){
  const d=new Date(),h=d.getHours(),dow=d.getDay();
  if(dow===0||dow===6||h<9||h>=19||(h>=12&&h<14))return;
  const chip=document.getElementById("chip-timer");
  if(E.timerIni||(chip&&chip.style.display!=="none"))return; // cartão aberto ou avulsa rodando
  const agoraMin=h*60+d.getMinutes();
  const ult=new Date(E._ultAtiv||Date.now());
  const ultMin=(ult.toDateString()===d.toDateString())?ult.getHours()*60+ult.getMinutes():9*60;
  const almoco=Math.max(0,Math.min(agoraMin,14*60)-Math.max(ultMin,12*60));
  const gap=agoraMin-ultMin-almoco;
  if(gap>=30)mostrarAlertaInativo(gap);}
function mostrarAlertaInativo(min){
  let b=document.getElementById("aviso-inativo");
  if(!b){b=ce("div");b.id="aviso-inativo";
    b.style.cssText="position:fixed;inset:0;z-index:500;background:rgba(26,46,56,.88);display:flex;align-items:center;justify-content:center;padding:20px";
    document.body.appendChild(b);}
  b.innerHTML=`<div style="background:white;border-radius:18px;padding:36px 34px;max-width:480px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.4)">
    <div style="font-size:52px;margin-bottom:10px">&#9888;</div>
    <div style="font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px">Você está há ${min} min sem atividade registrada</div>
    <div style="font-size:14px;color:var(--gray);margin-bottom:20px">Abra o cartão da tarefa em que está trabalhando — <b>e deixe aberto enquanto executa</b>. É assim que o sistema mede o seu tempo e monta um dia justo para você.</div>
    <button class="btn btp btw" style="font-size:15px;padding:12px" onclick="marcarAtividade()">OK, vou registrar</button></div>`;
  // aba piscando (estilo WhatsApp) até clicar em OK — funciona com a aba em segundo plano
  if(!E._tituloInt){E._tituloOrig=E._tituloOrig||document.title;
    let liga=false;
    E._tituloInt=setInterval(()=>{liga=!liga;
      document.title=liga?"🔴 (1) Volte ao sistema!":E._tituloOrig;},1200);}}

async function telaDiario(dia){

    ehHoje?DB.historicoHoje():DB.historicoDia(d),DB.tarefas(),
    ehHoje?Promise.resolve([]):DB.casos().catch(()=>[]),
    DB.snapshotDia(d).catch(()=>[])]);}catch(e){return erro(e.message);}
  const ts=(ops||[]).map(classificar);E.tarefas=ts;
  const mapa={};ts.forEach(t=>{if(t.id_tarefa)mapa[t.id_tarefa]=t;});
  const mapaEnc={};(casos||[]).forEach(c=>{const k=c.id_tarefa_origem||c.id_tarefa;if(k)mapaEnc[k]=c;});
  // barra de navegação por data
  let h=`<div class="painel" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <button class="btn bts btsm" onclick="diarioNavegar(-1)" title="Dia anterior">&#9664;</button>
    <input type="date" class="fsel" id="dia-data" value="${d}" max="${hoje}" onchange="telaDiario(this.value)">
    <button class="btn bts btsm" onclick="diarioNavegar(1)" ${ehHoje?"disabled":""} title="Dia seguinte">&#9654;</button>
    ${ehHoje?`<b style="font-size:12px;color:var(--green)">&#9679; Hoje</b>`
      :`<button class="btn btp btsm" onclick="telaDiario()">Voltar para hoje</button>
        <span style="font-size:12px;color:var(--gray)">Mostrando <b>${brData(d)}</b></span>`}</div>`;
  // resumo do dia: fotografia do robô + conclusões por pessoa
  const sn=(snap||[])[0];
  const concl=(hist||[]).filter(r=>/Tarefa concluída pelo site/.test(r.texto||""));
  const conclPor={};concl.forEach(r=>{const a=loginDe(r.autor);if(a)conclPor[a]=(conclPor[a]||0)+1;});
  if(sn||concl.length||!ehHoje){
    h+=`<div class="painel" style="background:#F6F9F6;border-color:#CFE3CF">
      <div class="bloco-t">&#128248; Resumo do dia ${brData(d)}</div>`;
    if(sn){const pct=sn.pct_em_dia_num!=null?Math.round(sn.pct_em_dia_num):esc(sn.pct_em_dia||"—");
      h+=`<div style="font-size:12px;margin-bottom:6px">${ehHoje?"Situação da equipe agora":"Como a equipe fechou o dia"}:
        <b style="color:var(--red)">${esc(sn.atrasadas||"0")} atrasadas</b> ·
        <b style="color:var(--green)">${esc(sn.em_dia||"0")} em dia</b> ·
        ${esc(sn.total_ativas||"0")} ativas · ${esc(sn.imediatas||"0")} imediatas ·
        <b>${pct}% em dia</b></div>`;}
    else h+=`<div style="font-size:12px;color:var(--gray);margin-bottom:6px">Sem fotografia da equipe para este dia (o robô só passou a registrar a partir de 15/07/2026).</div>`;
    const nomesC=Object.entries(conclPor).sort((a,b)=>b[1]-a[1]);
    h+=nomesC.length?`<div style="font-size:12px">&#9989; Tarefas concluídas no dia (${concl.length}): ${nomesC.map(([n,q])=>`<b>${esc(n)}</b> ${q}`).join(" · ")}</div>`
      :`<div style="font-size:12px;color:var(--gray)">&#9989; Nenhuma conclusão de tarefa registrada neste dia.</div>`;
    h+=`</div>`;}
  // painel de delegações ativas (só no hoje — é uma foto do presente) + movimentações do dia
  const delegAtivas=ehHoje?ts.filter(t=>t._impulso):[];
  const movDia=(hist||[]).filter(r=>/Impulso delegado|Retorno do impulso/.test(r.texto||""));
  if(delegAtivas.length||movDia.length){
    h+=`<div class="painel" style="background:#EEF3F9;border-color:#C9D8EA">
      <div class="bloco-t" style="color:#1F4E79">&#129309; Delegações de impulso</div>`;
    if(delegAtivas.length){h+=`<div style="font-size:12px;font-weight:700;margin-bottom:4px">Ativas agora (${delegAtivas.length})</div>`;
      delegAtivas.forEach(a=>{const de=(String(a.supervisao||"").match(/IMPULSO de\s*([^|]+)\|/)||[])[1]||"?";
        const ped=(String(a.supervisao||"").match(/Pedido:\s*([\s\S]+)$/)||[])[1]||"";
        h+=`<div class="linha-item" style="cursor:pointer" onclick="abrirTarefa('${esc(a.id_tarefa)}')">
          <span><b>${esc(de.trim())}</b> → <b>${esc(a.assessor)}</b> · ${esc(a.cliente)} · ${esc(a.check_||"")}<br>
          <span style="color:var(--gray);font-size:11px">${esc(ped.slice(0,110))}</span></span></div>`;});}
    if(movDia.length){h+=`<div style="font-size:12px;font-weight:700;margin:8px 0 4px">Movimentações ${ehHoje?"de hoje":"de "+brData(d)} (${movDia.length})</div>`;

    h+=`</div>`;}
  const por={};
  (hist||[]).forEach(r=>{const a=loginDe(r.autor);if(!a||a==="Sistema"||a==="Migração")return;
    const o=por[a]=por[a]||{upd:0,min:0,tarefas:{}};
    const k=r.id_tarefa||"—";
    const trf=o.tarefas[k]=o.tarefas[k]||{cliente:"",op:"",min:0,and:[],impulso:false};
    if(r.tipo==="TIMER"){const m=parseInt((String(r.texto||"").match(/(\d+)\s*min/)||[0,0])[1]);o.min+=m;trf.min+=m;}
    else if(r.tipo!=="HISTORICO"){o.upd++;if(r.texto)trf.and.push({tipo:r.tipo,texto:r.texto});}
    const mt=mapa[k],enc=mapaEnc[k];
    if(mt){trf.cliente=mt.cliente;trf.op=mt.operacao||"";trf.impulso=!!mt._impulso;}
    else if(enc){trf.cliente=enc.cliente||"";trf.op=(enc.operacao?enc.operacao+" · ":"")+"caso encerrado";}
    else if(String(k).includes("FIX"))trf.cliente="📌 Tarefa fixa";
    else if(k==="REUNIAO")trf.cliente="📅 Reunião";
    else if(k==="AVULSA")trf.cliente="⏱️ Atividade";});
  const lista=Object.entries(por).sort((a,b)=>b[1].upd-a[1].upd);
  if(!lista.length){h+=`<div class="vazio"><div style="font-size:28px">&#9200;</div><p>Sem atividade registrada ${ehHoje?"hoje ainda":"em "+brData(d)}.</p></div>`;
    ge("conteudo").innerHTML=h;return;}
  const mx=Math.max(1,...lista.map(([,d])=>d.upd));
  h+=lista.map(([nome,d],di)=>{const nc=nomeCompletoDe(nome);
    const tar=Object.entries(d.tarefas).map(([tid,t],ti)=>{
      const temAnd=t.and.length>0;
      const and=temAnd?`<div id="and-${di}-${ti}" style="display:none;margin:4px 0 6px 14px;padding:8px 12px;background:var(--ice);border-radius:8px;border-left:3px solid var(--dani)">
        ${t.and.map(a=>`<div style="font-size:12px;margin-bottom:4px"><span class="htipo">${esc(a.tipo)}</span> ${esc(a.texto)}</div>`).join("")}</div>`:"";
      return `<div class="linha-item" ${temAnd?`style="cursor:pointer" onclick="ge('and-${di}-${ti}').style.display=ge('and-${di}-${ti}').style.display==='none'?'block':'none'"`:""}>
        <span>${temAnd?"&#9656; ":""}${t.impulso?"&#129309; ":""}${esc(t.cliente||"Tarefa "+tid)}${t.op?" · "+esc(t.op):""}${temAnd?` <span style="color:var(--dani);font-size:11px">ver ${t.and.length}</span>`:""}</span>
        ${t.min?`<b>${t.min}min</b>`:""}</div>${and}`;}).join("");
    return `<div class="painel"><div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-weight:700;color:var(--navy)">${esc(nome)}${nc?` <span style="font-weight:400;color:var(--gray);font-size:12px">(${esc(nc)})</span>`:""}</span>
      <span style="font-size:12px;color:var(--gray)">${d.upd} atualizações · ${fmtMin(d.min)}</span></div>
      <div class="cap"><div style="width:${Math.round(d.upd/mx*100)}%;background:var(--navy)"></div></div>${tar}</div>`;}).join("");
  ge("conteudo").innerHTML=h;
}

        <span style="color:var(--green)">&#9201; ${fmtMin(p.min)} trabalhado</span><span>&#128221; ${p.upd} atualizações</span>
        <span>cap/dia ~${p.capDia} tarefas</span>${p.minReu?`<span>&#128197; ${fmtMin(p.minReu)} reuniões</span>`:""}</div>
      ${p.reunioes.length?p.reunioes.map(r=>`<div class="linha-item"><span>&#128197; ${esc(r.horario||"?")} ${esc(r.titulo)}</span><span>${esc(r.duracao_min||30)}min</span></div>`).join(""):""}</div>`;}).join("");
  // ===== robô de produtividade: tempo real por tipo de tarefa × assessor =====
  await carregarTemposReais((ops||[]).map(classificar));

    .sort((a,b)=>(E._tRealOpN[b]||0)-(E._tRealOpN[a]||0)).slice(0,20);
  if(opsComDados.length){

      return {v:v||null,q};};
    let tbl=`<tr><th style="text-align:left;padding:5px 8px">Tipo de tarefa</th>
      ${OPERACIONAIS.map(n=>`<th style="padding:5px 6px">${esc(n)}</th>`).join("")}

    opsComDados.forEach(op=>{
      const cels=OPERACIONAIS.map(n=>cel(op,n));
      const vals=cels.filter(c=>c.v!==null).map(c=>c.v);
      const mn=vals.length>1?Math.min(...vals):null,mx=vals.length>1?Math.max(...vals):null;
      tbl+=`<tr><td style="text-align:left;padding:4px 8px;font-weight:600">${esc(op)}</td>

          const cor=c.v===mn&&mn!==mx?"var(--green)":c.v===mx&&mn!==mx?"var(--red)":"var(--text)";
          return `<td style="padding:4px 6px;color:${cor};font-weight:${c.v===mn||c.v===mx?"700":"400"}">${c.v}min <span style="color:var(--gray);font-size:10px">(${c.q})</span></td>`;}).join("")}
        <td style="padding:4px 6px;color:var(--gray)">${(E._tRealOp||{})[op]?(E._tRealOp[op]+"min"):"—"}</td>
        <td style="padding:4px 6px;color:var(--gray)">${tempoDe(op)}min</td></tr>`;});
    h+=`<div class="painel"><div class="bloco-t">&#129302; Tempo real por tipo de tarefa (robô de produtividade)</div>
      <div style="font-size:11px;color:var(--gray);margin-bottom:8px">Mediana do tempo medido pelo cronômetro do site (soma das sessões da tarefa no dia). Entre parênteses, o nº de medições — só entram na conta pares com 5+. <b style="color:var(--green)">Verde = mais rápido</b> · <b style="color:var(--red)">vermelho = mais lento</b>. O cronômetro só vê o trabalho feito com o cartão aberto; os números afinam com o uso.</div>
      <div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:12px;text-align:center;min-width:640px">${tbl}</table></div></div>`;}
  // ===== 🎲 conferência por amostragem (contra o "marcar por marcar") =====
  // A amostra é sorteada 1x por semana e fica FIXA a semana toda — não adianta
  // recarregar a página esperando cair um caso mais fácil.
  let histSem=[];try{histSem=await DB.historicoPeriodo(7);}catch(e){histSem=[];}
  const semanaN=Math.floor(Date.now()/(7*86400000));
  const embaralha=s=>{let x=0;const t=String(s);for(let i=0;i<t.length;i++)x=(x*31+t.charCodeAt(i))>>>0;return (x^(semanaN*2654435761))>>>0;};
  const sorteia=(lst,n)=>[...lst].sort((a,b)=>embaralha(a.id_historico||a.linha)-embaralha(b.id_historico||b.linha)).slice(0,n);

  const relampago=conclSem.filter(r=>(minTarefa[r.id_tarefa]||0)<5).slice(0,5);

  if(conclSem.length||gruposSem.length)h+=`<div class="painel"><div class="bloco-t">&#127922; Conferência da semana (amostragem)</div>
    <div style="font-size:11px;color:var(--gray);margin-bottom:8px">Amostra sorteada automaticamente — a mesma a semana inteira. Abra cada caso e confira se o registro bate com a realidade (mensagem realmente enviada? trabalho realmente feito?). 5 minutos por semana mantêm os dados honestos.</div>
    ${conclSem.length?`<div style="font-size:12px;font-weight:700;margin:6px 0 3px">Conclusões para conferir (${Math.min(3,conclSem.length)} de ${conclSem.length} da semana)</div>${sorteia(conclSem,3).map(itemAmostra).join("")}`:""}
    ${gruposSem.length?`<div style="font-size:12px;font-weight:700;margin:8px 0 3px">Declarações de aviso no grupo (${Math.min(3,gruposSem.length)} de ${gruposSem.length})</div>${sorteia(gruposSem,3).map(itemAmostra).join("")}`:""}
    ${relampago.length?`<div style="font-size:12px;font-weight:700;margin:8px 0 3px;color:var(--amber)">&#9889; Conclusões relâmpago — menos de 5 min cronometrados (${relampago.length})</div>${relampago.map(itemAmostra).join("")}`:""}
  </div>`;
  ge("conteudo").innerHTML=h;
}

async function telaPrevisao(){
  setNav("prev","Previsão Mensal"); carregando();
  let ops;try{ops=await DB.tarefas();}catch(e){return erro(e.message);}
  const ts=(ops||[]).map(classificar).filter(t=>t.id_tarefa&&!t._delegada);E.tarefas=ts;
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const ano=hoje.getFullYear(),mes=hoje.getMonth();
  const porDia={},chave=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const usoDia={},fimMes=new Date(ano,mes+1,0);
  const poe=(k,t,tipo)=>{(porDia[k]=porDia[k]||[]).push({t,tipo});const a=t.assessor||"?";usoDia[k+a]=(usoDia[k+a]||0)+1;};
  // repetições futuras previstas pela frequência (a partir de uma data-âncora)
  const repete=(t,dAncora)=>{const f=String(t.check_||"").toUpperCase();
    if(/DIÁRIO|DIARIO/.test(f)){const d=new Date(dAncora);d.setDate(d.getDate()+1);
      while(d<=fimMes){if(d.getDay()!==0&&d.getDay()!==6)poe(chave(d),t,"recorrente");d.setDate(d.getDate()+1);}}
    else if(/SEMANAL/.test(f)){const d=new Date(dAncora);d.setDate(d.getDate()+7);
      while(d<=fimMes){poe(chave(d),t,"recorrente");d.setDate(d.getDate()+7);}}};
    // MENSAL: a próxima repetição cai no mês seguinte — fora deste calendário
  // 1) tarefas com data futura DENTRO do mês ficam no dia delas + suas repetições
  const semData=[];
  ts.forEach(t=>{const dt=t.data_revisao_dt?new Date(t.data_revisao_dt+"T00:00:00"):null;
    if(dt&&dt>=hoje&&dt.getMonth()===mes&&dt.getFullYear()===ano){poe(chave(dt),t,"agendado");repete(t,dt);}
    else if(!t._concluida)semData.push(t);});
  // 2) sem data / atrasadas: distribui pelos dias úteis respeitando o teto por
  //    assessor; cada uma também gera suas repetições a partir do dia estimado
  const capDiaDe=n=>Math.min(Math.floor(capDe(n)/20),10);
  const diasUteis=[];const dLoop=new Date(hoje);
  while(dLoop.getMonth()===mes){const w=dLoop.getDay();if(w!==0&&w!==6)diasUteis.push(chave(dLoop));dLoop.setDate(dLoop.getDate()+1);}
  let foraMes=0;
  semData.sort((a,b)=>(a._g-b._g)||((a._dias??9)-(b._dias??9)));
  semData.forEach(t=>{const a=t.assessor||"?";const teto=capDiaDe(a);
    for(const k of diasUteis){if((usoDia[k+a]||0)<teto){poe(k,t,"estimado");repete(t,new Date(k+"T00:00:00"));return;}}
    foraMes++;});
  Object.values(porDia).forEach(l=>l.sort((a,b)=>({agendado:0,estimado:1,recorrente:2}[a.tipo]-{agendado:0,estimado:1,recorrente:2}[b.tipo])));
  E._prevDias=porDia;E._prevMeta={ano,mes,foraMes};
  if(!E._prevFiltro)E._prevFiltro="todos";
  desenhaPrevisao();
}
function filtraPrev(n){E._prevFiltro=n;desenhaPrevisao();}
function desenhaPrevisao(){
  const {ano,mes,foraMes}=E._prevMeta,porDia=E._prevDias,f=E._prevFiltro;
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const nomeMes=hoje.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const passa=t=>f==="todos"||primeiroNome(t.assessor||"")===f;
  // pílulas de filtro por assessor (cores do sistema antigo)
  let pills=`<button class="btn btsm" onclick="filtraPrev('todos')" style="border-radius:20px;font-weight:700;border:2px solid ${f==="todos"?"var(--navy);background:var(--navy);color:white":"var(--border);background:white;color:var(--gray)"}">Todos</button>`;
  OPERACIONAIS.forEach(n=>{const c=corDe(n),sel=f===n;
    pills+=`<button class="btn btsm" onclick="filtraPrev('${n}')" style="border-radius:20px;font-weight:700;border:2px solid ${c.border};background:${sel?c.border:"white"};color:${sel?"white":c.text}">
      <span style="background:${c.dot};width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle"></span>${n}</button>`;});
  // calendário
  const prim=new Date(ano,mes,1),ini=(prim.getDay()+6)%7,nd=new Date(ano,mes+1,0).getDate();
  let cel=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"].map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--gray);padding:4px">${d}</div>`).join("");
  for(let b=0;b<ini;b++)cel+=`<div class="cald fora"></div>`;
  for(let dia=1;dia<=nd;dia++){const k=`${ano}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
    const lst=(porDia[k]||[]).filter(({t})=>passa(t)),ehHoje=dia===hoje.getDate();
    cel+=`<div class="cald ${ehHoje?"hoje":""}" onclick="verDia('${k}')">
      <div style="font-weight:700;font-size:12px;color:${ehHoje?"var(--dani)":"var(--text)"}">${dia}${ehHoje?' <span style="font-size:8px;background:var(--dani);color:white;border-radius:8px;padding:0 4px">HOJE</span>':""}</div>
      ${lst.slice(0,4).map(({t,tipo})=>{const c=corDe(t.assessor);
        return `<div class="calpin" style="background:${c.bg};border-left-color:${c.border};color:${c.text};${tipo!=="agendado"?"opacity:.65;border-left-style:dashed":""}">${tipo==="recorrente"?"&#8635; ":""}${esc(primeiroNome(t.assessor))} · ${esc(String(t.cliente||"").split(" ")[0])}</div>`;}).join("")}
      ${lst.length>4?`<div style="color:var(--dani);font-weight:700;margin-top:2px">+${lst.length-4}</div>`:""}</div>`;}
  // resumo por assessor: hoje / esta semana / no mês (igual ao antigo)
  const kHoje=hojeISO();
  const segS=new Date(hoje);segS.setDate(hoje.getDate()-((hoje.getDay()+6)%7));
  const domS=new Date(segS);domS.setDate(segS.getDate()+6);
  const kIni=segS.toISOString().slice(0,10),kFim=domS.toISOString().slice(0,10);
  const res={};OPERACIONAIS.forEach(n=>res[n]={hoje:0,sem:0,mes:0});
  Object.entries(porDia).forEach(([k,l])=>l.forEach(({t})=>{const n=primeiroNome(t.assessor||"");if(!res[n])return;
    res[n].mes++;if(k===kHoje)res[n].hoje++;if(k>=kIni&&k<=kFim)res[n].sem++;}));
  const cards=OPERACIONAIS.filter(n=>f==="todos"||f===n).map(n=>{const c=corDe(n),r=res[n];
    return `<div style="background:${c.bg};border:1.5px solid ${c.border};border-radius:10px;padding:10px 13px">
      <div style="font-size:12px;font-weight:700;color:${c.text};margin-bottom:6px">${n}</div>
      <div style="display:flex;gap:14px;text-align:center">
        <div><div style="font-size:18px;font-weight:700;color:var(--red)">${r.hoje}</div><div style="font-size:9px;color:var(--gray)">hoje</div></div>
        <div><div style="font-size:18px;font-weight:700;color:var(--amber)">${r.sem}</div><div style="font-size:9px;color:var(--gray)">semana</div></div>
        <div><div style="font-size:18px;font-weight:700;color:${c.text}">${r.mes}</div><div style="font-size:9px;color:var(--gray)">no mês</div></div>
      </div></div>`;}).join("");
  ge("conteudo").innerHTML=`<div class="painel"><div style="font-weight:700;color:var(--navy);text-transform:capitalize">${nomeMes}</div>
    <div style="font-size:11px;color:var(--gray);margin-bottom:8px">Cheio = data definida · tracejado = estimado pela capacidade · &#8635; = repetição prevista pela frequência (semanal volta a cada 7 dias, diária todo dia útil) · clique num dia para detalhes${foraMes?` · ${foraMes} além do mês`:""}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${pills}</div></div>
    <div class="calgrid">${cel}</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:14px">${cards}</div>`;
}
async function verDia(k){
  const f=E._prevFiltro||"todos";
  const lst=((E._prevDias||{})[k]||[]).filter(({t})=>f==="todos"||primeiroNome(t.assessor||"")===f);
  const d=k.split("-");
  ge("m-titulo").textContent=`${d[2]}/${d[1]}/${d[0]}`+(f!=="todos"?` · ${f}`:"");
  ge("m-sub").textContent=`${lst.length} tarefa(s) prevista(s)`;
  let h=lst.length?lst.map(({t,tipo})=>cardTarefa(t,true)+(tipo==="estimado"?"":"")).join(""):`<div class="vazio">Nada previsto.</div>`;
  h+=`<div id="dia-feito" style="margin-top:12px"></div>`;
  ge("m-corpo").innerHTML=h;ge("modal").classList.add("aberto");
  clearInterval(E.timerInt);E.atual=null;E.timerIni=null;
  // dia de hoje/passado: mostra o que FOI feito
  if(k<=hojeISO()){const box=ge("dia-feito");box.innerHTML=`<div class="carregando"><div class="spin"></div></div>`;
    try{const hist=await DB.historicoDia(k);
      const por={};(hist||[]).forEach(r=>{const a=loginDe(r.autor);if(!a||a==="Sistema")return;
        (por[a]=por[a]||[]).push(r);});
      const ents=Object.entries(por);
      box.innerHTML=ents.length?`<div class="bloco-t" style="color:var(--dani)">&#10003; O que foi feito neste dia</div>`+
        ents.map(([n,rs])=>`<div class="painel" style="padding:9px 12px"><b style="color:var(--navy)">${esc(n)}</b> — ${rs.length} registro(s)
          ${rs.filter(r=>r.tipo!=="TIMER").slice(0,8).map(r=>`<div style="font-size:12px;color:#555;margin-top:3px">• ${esc(String(r.texto||"").slice(0,120))}</div>`).join("")}</div>`).join("")
        :`<div style="font-size:12px;color:var(--gray)">Nenhum andamento registrado neste dia.</div>`;}
    catch(e){box.innerHTML="";}}
}
// =================================================== TELA: RELATÓRIO (head)
async function telaRelatorio(){
  setNav("rel","Relatório Semanal"); carregando();
  let hist,ops,props,casos;
  try{[hist,ops,props,casos]=await Promise.all([DB.historicoPeriodo(7),DB.tarefas(),DB.propostas(),DB.casos()]);}
  catch(e){return erro(e.message);}
  const ts=(ops||[]).map(classificar);
  const ini=new Date();ini.setDate(ini.getDate()-6);ini.setHours(0,0,0,0);
  const naSemana=d=>{if(!d)return false;const x=new Date(String(d).slice(0,10)+"T00:00:00");return x>=ini;};
  // indicadores gerais
  const concl=ts.filter(t=>t._concluida).length,
    atras=ts.filter(t=>t._atrasada&&!t._delegada&&!t._emCorrecao).length,
    imed=ts.filter(t=>t._g===1).length,
    pf7=ts.filter(t=>t._pfDias!==null&&t._pfDias>=0&&t._pfDias<=7).length,
    corr=ts.filter(t=>t._emCorrecao).length,
    encSem=(casos||[]).filter(c=>naSemana(c.data_encerramento_dt)).length,
    propLanc=(props||[]).filter(p=>naSemana(p.data_proposta_dt)).length,
    propAc=(props||[]).filter(p=>p.status==="Aceita"&&naSemana(p.data_proposta_dt)),
    propRua=(props||[]).filter(p=>["Enviada","Em análise","Em negociação","Aguardando cliente"].includes(p.status)).length,
    valAc=propAc.reduce((s,p)=>s+(parseFloat(p.valor_num)||0),0);
  const cardI=(ic,l,v,cor)=>`<div class="sc"><div class="sl">${ic} ${l}</div><div class="sv pq" style="color:${cor||"var(--navy)"}">${v}</div></div>`;
  let h=`<div class="painel" style="padding:8px 12px"><b>Período: ${ini.toLocaleDateString("pt-BR")} a ${new Date().toLocaleDateString("pt-BR")}</b></div>`;
  h+=`<div class="bloco-t">Produtividade da semana</div><div class="sg">
    ${cardI("&#10003;","Concluídas",concl,"var(--green)")}${cardI("&#128193;","Casos encerrados",encSem,"var(--green)")}
    ${cardI("&#9999;","Aguardando correção",corr,"#6B4FBF")}</div>`;
  h+=`<div class="bloco-t">Situação atual</div><div class="sg">
    ${cardI("&#128203;","Tarefas ativas",ts.filter(t=>t.id_tarefa).length)}
    ${cardI("&#128308;","Atrasadas",atras,atras?"var(--red)":"var(--green)")}
    ${cardI("&#128992;","Imediatas",imed,imed?"var(--amber)":"var(--green)")}
    ${cardI("&#9888;","Prazo fatal (7d)",pf7,pf7?"var(--red)":"var(--green)")}</div>`;
  h+=`<div class="bloco-t">Propostas comerciais</div><div class="sg">
    ${cardI("&#128203;","Lançadas",propLanc)}${cardI("&#10003;","Aceitas",propAc.length,"var(--green)")}
    ${cardI("&#128176;","Valor fechado","R$ "+valAc.toLocaleString("pt-BR",{minimumFractionDigits:2}),"var(--green)")}
    ${cardI("&#9203;","Na rua",propRua,"var(--amber)")}</div>`;
  // por assessor
  const por={};OPERACIONAIS.forEach(n=>por[n]={tarefas:new Set(),min:0,and:0,follow:0});
  (hist||[]).forEach(r=>{const a=loginDe(r.autor);if(!por[a])return;const o=por[a];
    if(r.id_tarefa)o.tarefas.add(r.id_tarefa);
    if(r.tipo==="TIMER")o.min+=parseInt((String(r.texto||"").match(/(\d+)\s*min/)||[0,0])[1]);
    else{o.and++;if(/follow-?up|cobrei/i.test(r.texto||""))o.follow++;}});
  h+=`<div class="bloco-t">Produtividade por assessor</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px">`+
    OPERACIONAIS.map(n=>{const d=por[n];return `<div class="painel">
      <div style="font-weight:700;color:var(--navy);margin-bottom:8px">${esc(n)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="sc" style="text-align:center"><div class="sv pq">${d.tarefas.size}</div><div class="sl">tarefas</div></div>
        <div class="sc" style="text-align:center"><div class="sv pq green">${fmtMin(d.min)}</div><div class="sl">tempo</div></div>
        <div class="sc" style="text-align:center"><div class="sv pq">${d.and}</div><div class="sl">andamentos</div></div>
        <div class="sc" style="text-align:center"><div class="sv pq amber">${d.follow}</div><div class="sl">follow-ups</div></div></div></div>`;}).join("")+`</div>`;
  ge("conteudo").innerHTML=h;
}

async function telaImpacto(){
  setNav("metrica","Impacto do Sistema"); carregando();
  let ops,hist,casos,snap;
  try{[ops,hist,casos,snap]=await Promise.all([DB.tarefas(),DB.historicoPeriodo(400),DB.casos(),DB.snapshot()]);}
  catch(e){return erro(e.message);}
  const ts=(ops||[]).map(classificar).filter(t=>t.id_tarefa);
  const total=ts.length,atr=ts.filter(t=>t._atrasada).length,emDia=total-atr;
  const pct=total?Math.round(emDia/total*100):0;
  const andamentos=(hist||[]).filter(r=>["ASSESSOR","SUPERVISÃO","CORRECAO"].includes(r.tipo)).length;
  const trab=new Set((hist||[]).filter(r=>r.id_tarefa).map(r=>r.id_tarefa)).size;
  const snap0=(snap||[])[0];
  let h=`<div class="painel" style="background:var(--navy);color:white;border:none">
    <div style="font-size:13px;opacity:.85">Desde o início do uso</div>
    <div style="font-size:22px;font-weight:800;margin-top:2px">até ${new Date().toLocaleDateString("pt-BR")}</div></div>
    <div class="sg">
      <div class="sc"><div class="sl">Andamentos registrados</div><div class="sv">${andamentos}</div></div>
      <div class="sc"><div class="sl">Tarefas trabalhadas</div><div class="sv">${trab}</div></div>
      <div class="sc"><div class="sl">Casos encerrados</div><div class="sv green">${(casos||[]).length}</div></div></div>
    <div class="painel"><div class="bloco-t">Situação atual das tarefas ativas</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div class="sc" style="text-align:center"><div class="sv green" style="font-size:34px">${emDia}</div><div class="sl">em dia</div></div>
        <div class="sc" style="text-align:center"><div class="sv red" style="font-size:34px">${atr}</div><div class="sl">atrasadas</div></div></div>
      <div class="cap" style="height:24px"><div style="width:${pct}%;background:var(--green);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:12px">${pct}% em dia</div></div></div>`;
  if(snap0)h+=`<div class="painel"><div class="bloco-t">Evolução desde o 1º retrato (${esc(snap0.data)})</div>
    <div style="font-size:13px">Início: <b>${esc(snap0.atrasadas)}</b> atrasadas · hoje: <b>${atr}</b>.
    ${parseInt(snap0.atrasadas)>atr?`<b style="color:var(--green)">✓ Redução de ${parseInt(snap0.atrasadas)-atr}!</b>`:""}</div></div>`;
  h+=`<div class="painel" style="background:var(--dani);color:white;border:none">
    <div style="font-size:11px;text-transform:uppercase;font-weight:700;opacity:.9">Resumo para apresentação</div>
    <div style="font-size:15px;margin-top:6px;line-height:1.5">A equipe registrou <b>${andamentos} andamentos</b> em <b>${trab} tarefas</b> e encerrou <b>${(casos||[]).length} casos</b>. Hoje, <b>${pct}% das tarefas estão em dia</b>.</div></div>`;
  ge("conteudo").innerHTML=h;
}

function filtraCasos(){
  const q=(ge("cs-q").value||"").toLowerCase(),m=ge("cs-m").value,hd=ge("cs-h").value,o=ge("cs-o").value;
  let f=E._casos.filter(c=>(!q||String(c.cliente||"").toLowerCase().includes(q)||String(c.cnpj_cpf||"").includes(q))
    &&(!m||c.motivo===m)&&(!hd||c.head===hd));
  if(o==="da")f=f.slice().reverse();
  if(o==="na")f=f.slice().sort((a,b)=>String(a.cliente||"").localeCompare(String(b.cliente||"")));
  ge("cs-lista").innerHTML=(f.length?`<p style="font-size:12px;color:var(--gray);margin-bottom:8px">${f.length} caso(s)</p>`:"")+
    (f.length?f.slice(0,500).map(c=>`<div class="painel" style="padding:12px 14px">
    <div style="display:flex;justify-content:space-between;gap:8px">
      <div style="flex:1;min-width:0"><div style="font-weight:700;color:var(--navy)">${esc(c.cliente)}</div>
        <div style="font-size:11px;color:var(--gray)">${esc(c.operacao||"")} · &#128100; ${esc(c.assessor||"—")} · ${esc(c.head||"")}${c.id_tarefa_origem?" · origem "+esc(c.id_tarefa_origem):""}</div></div>
      <div style="text-align:right"><span class="tag tm">${esc(c.motivo||"")}</span>
        ${c.data_encerramento_dt?`<div style="font-size:10px;color:var(--gray);margin-top:3px">enc ${brData(c.data_encerramento_dt)}</div>`:""}</div></div>
    ${c.resultado_judicial?`<div style="font-size:11px;font-weight:600;color:var(--navy);margin-top:5px">&#128737; ${esc(c.resultado_judicial)}</div>`:""}
    ${c.nota_final?`<div style="font-size:12px;color:var(--gray);margin-top:5px;font-style:italic">"${esc(c.nota_final)}"</div>`:""}
    <div class="linha-acao"><button class="btn bts btsm" onclick='verCaso(${JSON.stringify(c.id_encerrado)},${c.linha})'>&#128220; Histórico</button>
      ${E.perfil.head_sim?`<button class="btn bts btsm" onclick='abrirReabrir(${JSON.stringify(c.id_encerrado)},${c.linha})'>&#128260; Reabrir</button>`:""}</div></div>`).join("")

function filtroCliente(c){
  if(E._fSit==="OFICIAL"&&String(c.situacao||"")==="PROSPECCAO")return false;
  if(E._fSit==="PROSPECCAO"&&String(c.situacao||"")!=="PROSPECCAO")return false;
  const rg=String(c.regime||"").toUpperCase();
  if(E._fReg==="CONFIRMAR"&&!rg.includes("CONFIRMAR")&&!rg.includes("⚠"))return false;
  if(E._fReg==="SIMPLES"&&rg!=="SIMPLES NACIONAL"&&rg!=="MEI")return false;
  if(E._fReg==="PR"&&!(rg.includes("PRESUMIDO")||rg.includes("REAL"))||(E._fReg==="PR"&&rg.includes("⚠")))return false;
  if(E._fReg==="SEM"&&rg!=="")return false;
  if(E._fAtivo==="SEM"&&E._temTarefa[c.id_cliente])return false;

async function telaAgenda(){
  setNav("agenda","Minha Agenda"); carregando();
  let ops,reu;try{[ops,reu]=await Promise.all([DB.tarefas(),DB.reunioes()]);}catch(e){return erro(e.message);}
  const ts=(ops||[]).map(classificar).filter(t=>ehMeuNome(t.assessor));E.tarefas=(ops||[]).map(classificar);
  const minhasReu=(reu||[]).filter(r=>r.assessor===E.perfil.nome_sistema);
  // semana atual (seg-dom)
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const seg=new Date(hoje);seg.setDate(hoje.getDate()-((hoje.getDay()+6)%7));
  const dias=[];for(let i=0;i<7;i++){const d=new Date(seg);d.setDate(seg.getDate()+i);dias.push(d);}
  const chave=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const nomes=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
  let grade=`<div class="calgrid" style="grid-template-columns:repeat(7,1fr)">`;
  // projeção da semana: além das tarefas com data marcada, distribui as
  // atrasadas/sem data pelos dias úteis respeitando o teto diário (igual à Previsão)
  const kHoje=chave(hoje);
  const teto=Math.min(Math.floor(capDe(E.perfil.nome_sistema)/20),10);
  const fixasDia={},usoDia={};
  dias.forEach(d=>{const k=chave(d);
    fixasDia[k]=ts.filter(t=>String(t.data_revisao_dt||"").slice(0,10)===k&&!t._concluida);
    usoDia[k]=fixasDia[k].length;});
  const estimDia={};dias.forEach(d=>estimDia[chave(d)]=[]);
  const pend=ts.filter(t=>{if(t._concluida||t._delegada||t._emCorrecao)return false;
    const dr=String(t.data_revisao_dt||"").slice(0,10);return !dr||dr<kHoje;})
    .sort((a,b)=>(a._g-b._g)||((a._dias??9)-(b._dias??9)));
  pend.forEach(t=>{for(const d of dias){const k=chave(d);
    if(k<kHoje||d.getDay()===0||d.getDay()===6)continue;
    if(usoDia[k]<teto){estimDia[k].push(t);usoDia[k]++;return;}}});
  dias.forEach((d,i)=>{const k=chave(d),ehHoje=d.getTime()===hoje.getTime();
    const reuDia=minhasReu.filter(r=>String(r.data_dt||"").slice(0,10)===k);
    const tarDia=fixasDia[k],estDia=estimDia[k]||[];
    const pins=tarDia.map(t=>({t,est:false})).concat(estDia.map(t=>({t,est:true})));
    grade+=`<div class="cald ${ehHoje?"hoje":""}">
      <div style="font-size:10px;font-weight:700;color:var(--gray)">${nomes[i]}</div>
      <div style="font-weight:700;font-size:13px;color:${ehHoje?"var(--dani)":"var(--text)"}">${d.getDate()}</div>
      ${reuDia.map(r=>`<div class="calpin" style="background:#EFF6FF;border-left-color:var(--dani)">&#128197; ${esc(r.titulo)}</div>`).join("")}
      ${pins.slice(0,3).map(({t,est})=>`<div class="calpin" style="${est?"opacity:.65;border-left-style:dashed":""}">&#128203; ${esc(String(t.cliente||"").split(" ")[0])}</div>`).join("")}
      ${pins.length>3?`<div style="color:var(--dani);font-weight:700">+${pins.length-3}</div>`:""}</div>`;});
  grade+=`</div>
  <div style="font-size:11px;color:var(--gray);margin-top:4px">Cheio = data marcada · tracejado = estimado pela sua capacidade (até ${teto}/dia)</div>`;
  const hojeK=chave(hoje);
  const reuHoje=minhasReu.filter(r=>String(r.data_dt||"").slice(0,10)===hojeK)
    .sort((a,b)=>String(a.horario||"").localeCompare(String(b.horario||"")));
  const tarHoje=ts.filter(t=>t._g>=1&&t._g<=3&&!t._emCorrecao&&!t._delegada);
  let h=`<div class="linha-acao" style="margin-bottom:10px"><button class="btn btp btsm" onclick="abrirReuniao()">+ Reunião / compromisso</button></div>`;
  h+=grade;
  h+=`<div style="display:grid;grid-template-columns:280px 1fr;gap:12px;margin-top:14px" class="ag-cols">
    <div><div class="bloco-t">&#128197; Compromissos hoje</div>
    ${reuHoje.length?reuHoje.map(r=>`<div class="linha-item"><span><b>${esc(r.horario||"—")}</b> ${esc(r.titulo)}${r.cliente?"<br><span style='font-size:11px;color:var(--gray)'>"+esc(r.cliente)+"</span>":""}</span>
      <span>${esc(r.duracao_min||30)}min <button class="btn bts btsm" onclick='removerReuniao(${JSON.stringify(r.id_reuniao)})'>&#10005;</button></span></div>`).join("")
      :`<div style="font-size:12px;color:var(--gray)">Sem compromissos hoje.</div>`}</div>
    <div><div class="bloco-t">&#128203; Tarefas de hoje (${tarHoje.length})</div>
    ${tarHoje.length?tarHoje.map(t=>cardTarefa(t,false,true)).join(""):`<div style="font-size:12px;color:var(--gray)">Nada urgente hoje.</div>`}</div></div>`;
  ge("conteudo").innerHTML=h;
}

  const desc=prompt("O que você vai fazer agora?\n\nEx: Retorno aos grupos de WhatsApp, organização de e-mails...");
  if(desc===null)return;const d=String(desc).trim();
  if(!d){toast("Escreva o que vai fazer.","erro");return;}
  try{await DB.sessaoIniciar({id_tarefa:"AVULSA",cliente:"⏱️ "+d,operacao:d});}
  catch(e){toast("Erro: "+e.message,"erro");return;}
  ligaChipAvulsa(d,Date.now());
  toast("Atividade iniciada! O tempo está contando no topo.","ok");
}
function ligaChipAvulsa(desc,iniMs){
  E._avulsa={desc,ini:iniMs};
  ge("chip-timer").style.display="inline-flex";
  ge("chip-timer-desc").textContent=desc.slice(0,26);
  clearInterval(E._avulsaInt);
  E._avulsaInt=setInterval(()=>{const s=Math.floor((Date.now()-E._avulsa.ini)/1000);
    ge("chip-timer-num").textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0");},1000);
}
async function pararAvulsa(){
  if(!E._avulsa)return;
  const min=Math.round((Date.now()-E._avulsa.ini)/60000);
  clearInterval(E._avulsaInt);ge("chip-timer").style.display="none";
  try{await DB.sessaoConcluir(min);
    if(min>=1)await DB.nota({id_tarefa:"AVULSA",id_cliente:null,tipo:"TIMER",texto:`Tempo registrado: ${min} min — ⏱️ ${E._avulsa.desc}`});}
  catch(e){toast("Erro: "+e.message,"erro");}
  toast(`Atividade registrada: ${min} min.`,"ok");E._avulsa=null;marcarAtividade();
}
async function retomarSessaoAtiva(){
  try{const s=await DB.sessaoAtiva();
    if(s&&s.id_tarefa==="AVULSA"){const m=String(s.hora_inicio||"").match(/(\d{1,2}):(\d{2})/);
      let ini=Date.now();if(m){const d0=new Date();d0.setHours(+m[1],+m[2],0,0);if(d0.getTime()<=Date.now())ini=d0.getTime();}
      ligaChipAvulsa(String(s.operacao||s.cliente||"Atividade").replace(/^⏱️\s*/,""),ini);}}
  catch(e){}
}

iniciar();
</script>
